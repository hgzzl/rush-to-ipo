<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1050" viewBox="0 0 750 1050" role="img" aria-labelledby="title desc">
  <title id="title">Rush to IPO — Launch Lab Agency card</title>
  <desc id="desc">A sample illustrated Agency card providing two Brand skill and one Production skill for one dollar Upkeep.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/><stop offset="1" stop-color="#f3efe5"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f8bfd0"/><stop offset="1" stop-color="#ed91b0"/>
    </linearGradient>
    <pattern id="hatch" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 0V28" stroke="#fff" stroke-opacity=".23" stroke-width="3"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#10291f" flood-opacity=".24"/>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>

  <rect width="750" height="1050" fill="#e8e5dc"/>
  <g filter="url(#shadow)">
    <rect x="50" y="35" width="650" height="980" rx="34" fill="url(#paper)" stroke="#183128" stroke-width="5"/>
    <rect x="63" y="48" width="624" height="954" rx="25" fill="none" stroke="#183128" stroke-opacity=".18" stroke-width="2"/>

    <!-- illustrated top half -->
    <path d="M84 50h582a20 20 0 0 1 20 20v558H64V70a20 20 0 0 1 20-20Z" fill="url(#sky)"/>
    <path d="M64 50h622v578H64Z" fill="url(#hatch)"/>
    <circle cx="548" cy="252" r="106" fill="#fff7e9" opacity=".55"/>
    <circle cx="548" cy="252" r="76" fill="#ffd56a" opacity=".46"/>
    <path d="M64 534c116-58 194-44 293 9 112 60 208 51 329-36v121H64Z" fill="#153e30"/>
    <path d="M64 565c126-47 226-28 307 17 106 59 202 35 315-34v80H64Z" fill="#245943" opacity=".85"/>

    <!-- rocket / launch illustration -->
    <g transform="translate(365 190) rotate(12)">
      <path d="M0 240c-32-96-17-198 62-277 79 79 94 181 62 277Z" fill="#fffdf8" stroke="#173b2d" stroke-width="8"/>
      <path d="M62-37c27 28 47 60 59 93H3c12-33 32-65 59-93Z" fill="#c8f04b" stroke="#173b2d" stroke-width="8"/>
      <circle cx="62" cy="95" r="34" fill="#72a0ef" stroke="#173b2d" stroke-width="8"/>
      <circle cx="62" cy="95" r="17" fill="#dce9ff"/>
      <path d="M3 166-48 226l52 4M121 166l51 60-52 4" fill="#f47fa3" stroke="#173b2d" stroke-width="8" stroke-linejoin="round"/>
      <path d="M35 240 62 326l27-86Z" fill="#ffd35c" stroke="#173b2d" stroke-width="8"/>
      <path d="M47 251 62 300l15-49Z" fill="#f28342"/>
    </g>

    <!-- motion stars -->
    <g fill="#fffdf8" stroke="#173b2d" stroke-width="4">
      <path d="m602 377 9 22 23 9-23 9-9 23-9-23-23-9 23-9Z"/>
      <path d="m610 129 6 14 15 6-15 6-6 15-6-15-15-6 15-6Z"/>
      <path d="m193 392 6 14 15 6-15 6-6 15-6-15-15-6 15-6Z"/>
    </g>

    <!-- top labels -->
    <rect x="92" y="82" width="132" height="45" rx="7" fill="#fff" fill-opacity=".5" stroke="#173b2d" stroke-width="2"/>
    <text x="158" y="111" text-anchor="middle" fill="#173b2d" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" letter-spacing="2">AGENCY</text>
    <text x="646" y="111" text-anchor="end" fill="#173b2d" opacity=".65" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">T01</text>
    <text x="94" y="181" fill="#173b2d" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="900" letter-spacing="-3">Launch</text>
    <text x="94" y="244" fill="#173b2d" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="900" letter-spacing="-3">Lab</text>
    <text x="97" y="282" fill="#173b2d" opacity=".72" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" letter-spacing="1.5">IDEAS INTO MOTION.</text>

    <!-- rules area -->
    <line x1="64" y1="628" x2="686" y2="628" stroke="#173b2d" stroke-width="5"/>
    <text x="94" y="684" fill="#68766f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" letter-spacing="2">SKILLS ADDED TO YOUR ENGINE</text>

    <g transform="translate(94 714)">
      <rect width="562" height="76" rx="12" fill="#f8edf1" stroke="#e1cbd2" stroke-width="2"/>
      <circle cx="42" cy="38" r="25" fill="#dc6f8e"/>
      <path d="M29 34v9l22 9V25l-22 9Zm22-2c8 0 12-6 12-13M51 45c8 0 12 6 12 13" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="82" y="33" fill="#5e6963" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">BRAND</text>
      <text x="82" y="58" fill="#173b2d" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800">Campaign strategy</text>
      <text x="523" y="52" text-anchor="middle" fill="#173b2d" font-family="Arial, Helvetica, sans-serif" font-size="43" font-weight="900">2</text>
    </g>

    <g transform="translate(94 802)">
      <rect width="562" height="76" rx="12" fill="#fbf3df" stroke="#e4d4a8" stroke-width="2"/>
      <circle cx="42" cy="38" r="25" fill="#e7b84a"/>
      <path d="M29 52V35l13 7V29l17 10v13M25 54h39M33 29V17h8v17" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="82" y="33" fill="#5e6963" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">PRODUCTION</text>
      <text x="82" y="58" fill="#173b2d" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800">Launch execution</text>
      <text x="523" y="52" text-anchor="middle" fill="#173b2d" font-family="Arial, Helvetica, sans-serif" font-size="43" font-weight="900">1</text>
    </g>

    <g transform="translate(94 904)">
      <rect width="562" height="63" rx="11" fill="#173b2d"/>
      <text x="25" y="39" fill="#c8f04b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="700" letter-spacing="1">$1 UPKEEP EACH TURN</text>
      <text x="537" y="39" text-anchor="end" fill="#fffdf8" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800">3 TOTAL SKILL</text>
    </g>
  </g>
</svg>
